<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat Sheet - HPCL Scholar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views.css">
    <style>
        .cheatsheet-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .cheatsheet-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .cheatsheet-title {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .cheatsheet-section {
            margin-bottom: 2rem;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .cheatsheet-section:nth-child(1) { animation-delay: 0.1s; }
        .cheatsheet-section:nth-child(2) { animation-delay: 0.2s; }
        .cheatsheet-section:nth-child(3) { animation-delay: 0.3s; }
        .cheatsheet-section:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid color-mix(in srgb, var(--accent) 15%, transparent);
        }

        .section-header i {
            color: var(--accent);
            font-size: 1.25rem;
        }

        .section-header h2 {
            font-size: 1.4rem;
            color: var(--primary);
            margin: 0;
        }

        .content-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            line-height: 1.7;
        }

        .formula-box {
            background: color-mix(in srgb, var(--accent) 5%, var(--bg));
            border-left: 5px solid var(--accent);
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .formula-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .formula-list li {
            margin-bottom: 0.75rem;
            position: relative;
            padding-left: 1.5rem;
        }

        .formula-list li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        .worked-example {
            background: #f8fafc;
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .back-btn {
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .cheatsheet-footer {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 4rem 0 6rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .cheatsheet-title {
                font-size: 1.8rem;
            }
            .content-card {
                padding: 1.5rem;
            }
            .cheatsheet-footer {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body class="mouse-motion theme-vintage">

    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-university"></i><span>HPCL Scholar</span></div>
        </div>
        <ul class="nav-links">
            <li><a class="nav-item active" href="learn.html"><i class="fas fa-book"></i><span>Guide</span></a></li>
            <li><a class="nav-item" href="analyze.html"><i class="fas fa-lightbulb"></i><span>Vault</span></a></li>
            <li><a class="nav-item" href="analytics.html"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
            <li><a class="nav-item" href="exam.html"><i class="fas fa-pen-nib"></i><span>Exam</span></a></li>
        </ul>
    </nav>

    <main class="main">
        <div class="cheatsheet-container">
            <a href="learn.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Guide
            </a>

            <div id="cheatsheetContent">
                <!-- Loading State -->
                <div class="cheatsheet-header">
                    <h1 class="cheatsheet-title" id="topicTitle">Loading Cheat Sheet...</h1>
                    <div id="topicMeta"></div>
                </div>
                
                <div class="cheatsheet-section">
                    <div class="section-header">
                        <i class="fas fa-bookmark"></i>
                        <h2>Concept Summary</h2>
                    </div>
                    <div class="content-card" id="summaryContent">
                        <p>Preparing the concept summary for you...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/common.js"></script>
    <script src="js/cheatsheet.js"></script>
</body>

</html>
