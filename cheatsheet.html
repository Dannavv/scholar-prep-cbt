<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat Sheet - HPCL Scholar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views.css">
    <style>
        .cheatsheet-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .cheatsheet-header {
            margin-bottom: 4rem;
            text-align: center;
        }

        .cheatsheet-title {
            font-size: 3.2rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
            font-family: 'Lora', serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .topic-meta {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .cheatsheet-section {
            margin-bottom: 2rem;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .cheatsheet-section:nth-child(1) {
            animation-delay: 0.1s;
        }

        .cheatsheet-section:nth-child(2) {
            animation-delay: 0.2s;
        }

        .cheatsheet-section:nth-child(3) {
            animation-delay: 0.3s;
        }

        .cheatsheet-section:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .cheatsheet-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
        }

        .section-header i {
            color: var(--accent);
            font-size: 1.5rem;
            background: color-mix(in srgb, var(--accent) 10%, transparent);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .section-header h2 {
            font-size: 1.6rem;
            color: var(--primary);
            margin: 0;
            font-family: 'Lora', serif;
        }

        .content-card {
            border: none;
            padding: 0;
            box-shadow: none;
            background: transparent;
        }

        .formula-box {
            background: color-mix(in srgb, var(--accent) 5%, var(--bg));
            border-left: 5px solid var(--accent);
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1rem 0;
        }

        .formula-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .formula-list li {
            margin-bottom: 0.75rem;
            position: relative;
            padding-left: 1.5rem;
            font-size: 1.05rem;
        }

        .formula-list li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        .worked-example {
            background: #f8fafc;
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .back-btn {
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .summary-text, .details-text, .example-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text);
        }

        .summary-text {
            font-weight: 500;
        }

        .details-text b {
            color: var(--primary);
            font-weight: 700;
        }

        .cheatsheet-footer {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 4rem 0 6rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 980px) {
            .cheatsheet-container {
                padding: 0 1rem;
            }

            .cheatsheet-header {
                margin-bottom: 2rem;
            }

            .cheatsheet-title {
                font-size: 1.6rem;
                line-height: 1.2;
                margin-bottom: 0.5rem;
            }

            .cheatsheet-section {
                padding: 1.5rem;
                margin-bottom: 1.5rem;
                border-radius: 20px;
            }

            .section-header {
                gap: 0.75rem;
                margin-bottom: 1.25rem;
                padding-bottom: 0.75rem;
            }

            .section-header i {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
                border-radius: 10px;
            }

            .section-header h2 {
                font-size: 1.2rem;
            }

            .content-card {
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .formula-list li,
            .summary-text,
            .details-text,
            .example-text {
                font-size: 0.95rem !important;
                line-height: 1.6 !important;
            }

            .cheatsheet-footer {
                flex-direction: column;
                gap: 0.75rem;
                margin: 3rem 0 6rem;
            }

            .btn {
                font-size: 0.95rem !important;
                padding: 1rem !important;
                border-radius: 14px !important;
                width: 100%;
            }

            .back-btn {
                font-size: 1rem;
                margin-bottom: 1.5rem;
            }

            .topic-meta .badge {
                font-size: 0.75rem !important;
                padding: 0.35rem 0.7rem !important;
            }

            .formula-box {
                padding: 1rem;
            }

            .worked-example {
                padding: 1rem;
            }
        }
    </style>
</head>

<body class="mouse-motion theme-vintage">

    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-university"></i><span>HPCL Scholar</span></div>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>
        <ul class="nav-links">
            <li><a class="nav-item" href="learn.html"><i class="fas fa-book"></i><span>Guide (Paper 1)</span></a></li>
            <li><a class="nav-item" href="paper2-learn.html"><i class="fas fa-laptop-code"></i><span>Guide (Paper 2)</span></a></li>
            <li><a class="nav-item" href="analyze.html"><i class="fas fa-lightbulb"></i><span>Vault</span></a></li>
            <li><a class="nav-item" href="analytics.html"><i class="fas fa-chart-line"></i><span>Analytics</span></a>
            </li>
            <li><a class="nav-item" href="exam.html"><i class="fas fa-pen-nib"></i><span>Exam</span></a></li>
        </ul>
    </nav>

    <main class="main">
        <div class="cheatsheet-container">
            <a href="learn.html" id="topBackBtn" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Guide
            </a>

            <div id="cheatsheetContent">
                <!-- Loading State -->
                <div class="cheatsheet-header">
                    <h1 class="cheatsheet-title" id="topicTitle">Loading Cheat Sheet...</h1>
                    <div id="topicMeta"></div>
                </div>

                <div class="cheatsheet-section">
                    <div class="section-header">
                        <i class="fas fa-bookmark"></i>
                        <h2>Concept Summary</h2>
                    </div>
                    <div class="content-card" id="summaryContent">
                        <p>Preparing the concept summary for you...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/paper2-data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/common.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cheatsheet.js"></script>
</body>

</html>
