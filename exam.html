<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Exam - HPCL Scholar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views.css">
</head>
<body class="theme-vintage">

    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-university"></i><span>HPCL Scholar</span></div>
            <button class="btn" style="color: rgba(255,255,255,0.6); padding: 0.5rem;" onclick="requestFullscreen()"><i class="fas fa-expand"></i></button>
        </div>
        <ul class="nav-links">
            <li class="nav-item" onclick="location.href='learn.html'"><i class="fas fa-book"></i><span>Guide</span></li>
            <li class="nav-item" onclick="location.href='analyze.html'"><i class="fas fa-lightbulb"></i><span>Vault</span></li>
            <li class="nav-item active" onclick="location.href='exam.html'"><i class="fas fa-pen-nib"></i><span>Exam</span></li>
        </ul>
    </nav>

    <main class="main">
        <section id="exam" class="view active">
            <div id="examHome">
                <header>
                    <span class="eyebrow">Mock Examination</span>
                    <h1>Practice Session Builder</h1>
                    <p>Choose the length and section before starting.</p>
                </header>
                <div class="card" style="text-align: center; padding: 2rem;">
                    <i class="fas fa-sliders-h" style="font-size: 2rem; color: var(--accent); margin-bottom: 1rem;"></i>
                    <h2>Configure a Session</h2>
                    <div class="config-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-top: 1.5rem;">
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem; text-align: left;">
                            <label style="font-weight: 700; color: var(--primary);">Count</label>
                            <select id="examLength" class="form-select" style="padding: 0.7rem; border-radius: 12px; border: 1px solid var(--border);">
                                <option value="10">10 Qs</option>
                                <option value="25">25 Qs</option>
                                <option value="100" selected>Full Mock</option>
                            </select>
                        </div>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem; text-align: left;">
                            <label style="font-weight: 700; color: var(--primary);">Focus</label>
                            <select id="examSection" class="form-select" style="padding: 0.7rem; border-radius: 12px; border: 1px solid var(--border);">
                                <option value="all">All</option>
                                <option value="Quantitative Aptitude">Quant</option>
                                <option value="Reasoning">Reasoning</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="prepareExam()" style="margin-top: 2rem; padding: 1rem 2rem;">Start Session</button>
                    <div id="historyList" style="margin-top: 2rem; text-align: left;"></div>
                </div>
            </div>

            <div id="examActive" style="display: none;">
                <div class="cbt-container">
                    <div class="cbt-header"><div id="examTitle">HPCL Mock</div><div class="timer-box" id="timer">00:00</div></div>
                    <div class="cbt-body">
                        <div id="progress" style="margin-bottom: 0.5rem; font-size: 0.9rem;">Q 1 / 10</div>
                        <div id="questionContainer">
                            <h2 class="question-text" id="qText" style="font-size: 1.15rem;">Loading...</h2>
                            <div class="options-list" id="optionsList"></div>
                        </div>
                    </div>
                    <div class="cbt-footer">
                        <button class="btn btn-outline" id="prevBtn" onclick="navigateQuestion(-1)">Prev</button>
                        <button class="btn btn-primary" id="nextBtn" onclick="navigateQuestion(1)">Next</button>
                    </div>
                </div>
            </div>
            
            <div id="examResult" style="display: none;">
                <div style="text-align: center;">
                    <h1>Results</h1>
                    <div id="finalScore" style="font-size: 3rem; font-weight: 800; color: var(--primary);">0 / 0</div>
                    <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 1rem;">Finish</button>
                </div>
                <div id="analysisReport" style="margin-top: 2rem;"></div>
            </div>
        </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
