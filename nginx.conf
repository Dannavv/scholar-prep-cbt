user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    log_format activity_log escape=json '{"time":"$time_iso8601", "ip":"$remote_addr", "activity": "$arg_data"}';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # The activity logging endpoint
        location = /api/sync {
            access_log /var/log/nginx/activity.log activity_log;
            return 204;
        }

        # Prevent browser access to logs directory just in case it is ever mapped to web root
        location /logs {
            deny all;
            return 404;
        }

        # Protect any .log files
        location ~ \.log$ {
            deny all;
            return 404;
        }
    }
}
