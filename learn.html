<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn - HPCL Scholar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views.css">
</head>
<body class="mouse-motion theme-vintage">

    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-university"></i><span>HPCL Scholar</span></div>
            <button class="btn" style="color: rgba(255,255,255,0.6); padding: 0.5rem;" onclick="requestFullscreen()"><i class="fas fa-expand"></i></button>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" onclick="location.href='learn.html'"><i class="fas fa-book"></i><span>Guide</span></li>
            <li class="nav-item" onclick="location.href='analyze.html'"><i class="fas fa-lightbulb"></i><span>Vault</span></li>
            <li class="nav-item" onclick="location.href='exam.html'"><i class="fas fa-pen-nib"></i><span>Exam</span></li>
        </ul>
    </nav>

    <main class="main">
        <section id="learn" class="view active">
            <header>
                <span class="eyebrow">Curated Concepts</span>
                <h1>Topic Mastery</h1>
                <p>Focused revision built from the HPCL aptitude pattern.</p>
                <div class="hero-panel">
                    <div class="stat-row" id="statRow"></div>
                </div>
            </header>
            <div class="topic-summary" style="margin-bottom: 2.5rem;">
                <h3>How to use this page</h3>
                <p>Open a topic card to read a brief note about the topic and understand what it tests.</p>
            </div>
            <div class="grid" id="topicGrid" style="grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 1.5rem;"></div>
        </section>
    </main>

    <div class="modal" id="explanationModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Topic Logic</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
